name: Daily Stock Analysis

# 触发条件
on:
  schedule:
    # 每天 A 股收盘后运行（这里设置的是 UTC 时间 07:30，即北京时间 15:30）
    - cron: '30 7 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上点击按钮手动触发

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/actions-setup-python@v5
      with:
        python-version: '3.10' # 根据项目需求，通常 3.10 或 3.11 即可

    # 3. 安装依赖缓存（加速后续运行）
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. 安装项目依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 5. 运行分析脚本
    - name: Run Stock Analysis
      env:
        # 如果脚本需要微信、钉钉或邮件通知，请在这里配置环境变量
        # 你需要在仓库的 Settings -> Secrets and variables -> Actions 中添加这些机密数据
        NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }} 
      run: |
        # 请根据该项目的实际入口文件名修改，比如 main.py 或 analysis.py
        python main.py
